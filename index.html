<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ワーホリ英会話トレーナー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f6f3ec;
    --card: #fdfcf8;
    --ink: #2b2620;
    --muted: #94897a;
    --accent: #1f4e5f;
    --accent-soft: #e9efef;
    --line: #e2dccf;
    --done: #4a7c59;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  button { touch-action: manipulation; font-family: inherit; }
  body {
    font-family: "Zen Kaku Gothic New", "Hiragino Sans", "Yu Gothic UI", "Segoe UI", sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.75;
  }
  header {
    max-width: 760px;
    margin: 0 auto;
    padding: 34px 20px 4px;
  }
  header h1 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  header p { color: var(--muted); font-size: 0.83rem; margin-top: 6px; }

  .controls {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 0;
    padding: 12px 20px 2px;
    position: sticky;
    top: 0;
    background: var(--paper);
    z-index: 10;
  }
  .controls button {
    background: none;
    border: 1px solid var(--line);
    border-right-width: 0;
    color: var(--muted);
    padding: 5px 16px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: color 0.15s, background 0.15s;
  }
  .controls button:first-child { border-radius: 4px 0 0 4px; }
  .controls button:nth-child(2) { border-radius: 0 4px 4px 0; border-right-width: 1px; }
  .controls button:last-child {
    border: none;
    margin-left: auto;
    font-size: 0.78rem;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: var(--line);
  }
  .controls button:hover { color: var(--ink); }
  .controls button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .controls button:last-child.active { background: none; color: var(--ink); }
  .controls select {
    margin-left: auto;
    max-width: 42%;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--muted);
    font-size: 0.75rem;
    padding: 4px 6px;
    border-radius: 4px;
    font-family: inherit;
  }

  #job-nav {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    flex-wrap: wrap;
    gap: 0 22px;
    overflow-x: auto;
    padding: 14px 20px 0;
    border-bottom: 1px solid var(--line);
    scrollbar-width: none;
  }
  #job-nav::-webkit-scrollbar { display: none; }
  #job-nav button {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 4px 1px 10px;
    font-size: 0.9rem;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.15s;
  }
  #job-nav button:hover { color: var(--ink); }
  #job-nav button.active {
    color: var(--ink);
    font-weight: 600;
    border-bottom-color: var(--accent);
  }

  nav {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    flex-wrap: wrap;
    gap: 2px 18px;
    padding: 14px 20px 4px;
  }
  nav button {
    background: none;
    border: none;
    font-size: 0.82rem;
    color: var(--muted);
    cursor: pointer;
    padding: 2px 0;
    transition: color 0.15s;
  }
  nav button:hover { color: var(--ink); }
  nav button.active { color: var(--accent); font-weight: 600; }
  nav button.done::after { content: " ✓"; color: var(--done); }

  main { max-width: 760px; margin: 0 auto; padding: 8px 20px 80px; }

  .scene-header { margin: 22px 0 6px; }
  .scene-header h2 {
    font-size: 1.15rem;
    font-weight: 700;
  }
  .scene-header p { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }

  .shadow-audio {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 12px 0 4px;
    flex-wrap: wrap;
  }
  .shadow-audio audio { height: 36px; max-width: 100%; flex: 1; min-width: 220px; }
  .scene-actions { display: flex; gap: 8px; margin: 12px 0 22px; flex-wrap: wrap; }
  .scene-actions button {
    background: none;
    border: 1px solid var(--line);
    color: var(--muted);
    border-radius: 4px;
    padding: 5px 14px;
    cursor: pointer;
    font-size: 0.8rem;
  }
  .scene-actions button:hover { color: var(--ink); border-color: var(--muted); }

  .line {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .line.staff { align-items: flex-end; }
  .who {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.09em;
    color: var(--muted);
    margin: 0 8px 2px;
  }
  .line.staff .who { color: var(--accent); }
  .bubble {
    max-width: 78%;
    padding: 9px 14px;
    border-radius: 12px;
    background: var(--card);
    border: 1px solid var(--line);
  }
  .line.customer .bubble { border-top-left-radius: 4px; }
  .line.staff .bubble {
    background: var(--accent-soft);
    border-color: #d1dee1;
    border-top-right-radius: 4px;
  }
  .en {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 1.02rem;
  }
  .ja { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
  body.hide-ja .ja { display: none; }

  .play-btn {
    background: none;
    border: none;
    color: #c3b9a8;
    cursor: pointer;
    font-size: 0.75rem;
    margin-left: 8px;
    padding: 0 2px;
    vertical-align: middle;
  }
  .play-btn:hover { color: var(--accent); }

  /* AIロールプレイ */
  .chat-input-row { display: flex; gap: 8px; margin: 18px 0; }
  .chat-input-row input {
    flex: 1;
    min-width: 0;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 16px;
    font-family: inherit;
    background: var(--card);
    color: var(--ink);
  }
  .chat-input-row input:focus { outline: none; border-color: var(--accent); }
  .chat-input-row button {
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    border-radius: 6px;
    padding: 10px 14px;
    cursor: pointer;
    font-size: 0.9rem;
    white-space: nowrap;
  }
  .chat-input-row button:hover { border-color: var(--accent); }
  #mic-btn.listening { background: var(--accent); color: #fff; border-color: var(--accent); animation: mic-pulse 1.2s infinite; }
  @keyframes mic-pulse { 50% { opacity: 0.55; } }
  @media (prefers-reduced-motion: reduce) { #mic-btn.listening { animation: none; } }
  .ai-error { color: #a03535; font-size: 0.85rem; margin: 10px 0; text-align: center; }
  .ai-hint { text-align: center; color: var(--muted); font-size: 0.85rem; margin: 26px 0; }

  /* 瞬間英作文 */
  .sed-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 34px 24px;
    text-align: center;
    margin: 22px 0;
  }
  .sed-ja { font-size: 1.15rem; font-weight: 600; line-height: 1.7; }
  .sed-en {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 1.05rem;
    margin-top: 16px;
    color: var(--accent);
  }
  .sed-timer {
    height: 4px;
    background: var(--line);
    margin: 20px auto 0;
    width: 70%;
    border-radius: 2px;
    overflow: hidden;
  }
  .sed-timer > div { height: 100%; background: var(--accent); animation: sed-shrink 2s linear forwards; }
  @keyframes sed-shrink { from { width: 100%; } to { width: 0; } }
  @media (prefers-reduced-motion: reduce) { .sed-timer > div { animation: none; } }
  .sed-btns { display: flex; gap: 10px; justify-content: center; margin-top: 22px; flex-wrap: wrap; }
  .sed-btns button {
    border: 1px solid var(--line);
    background: var(--card);
    border-radius: 8px;
    padding: 12px 22px;
    font-size: 0.95rem;
    cursor: pointer;
    color: var(--ink);
  }
  .sed-btns button:hover { border-color: var(--accent); }
  .sed-btns .sed-ok { border-color: var(--done); color: var(--done); }
  .sed-btns .sed-ng { border-color: #a03535; color: #a03535; }
  .sed-select {
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    padding: 6px 8px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 0.85rem;
  }

  /* ロールプレイモード: 自分のセリフを隠す */
  body.roleplay .line.staff .bubble.hidden-answer .en,
  body.roleplay .line.staff .bubble.hidden-answer .ja,
  body.roleplay .line.staff .bubble.hidden-answer .play-btn { display: none; }
  body.roleplay .line.staff .bubble.hidden-answer::after {
    content: "あなたの番 — 声に出して言ってから、ここを押して答え合わせ";
    display: block;
    color: var(--accent);
    font-size: 0.82rem;
    padding: 4px 0;
    cursor: pointer;
  }
  body.roleplay .line.staff .bubble.hidden-answer {
    cursor: pointer;
    background: var(--card);
    border: 1px dashed var(--accent);
  }

  .tips {
    background: var(--card);
    border-left: 3px solid var(--accent);
    padding: 14px 18px;
    margin: 26px 0;
    font-size: 0.87rem;
  }
  .tips h3 {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .tips li { margin-left: 18px; margin-bottom: 5px; color: #4d453a; }

  .complete-row { text-align: center; margin-top: 26px; }
  .complete-row button {
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 4px;
    padding: 8px 24px;
    font-size: 0.88rem;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .complete-row button:hover { background: var(--accent-soft); }
  .complete-row button.completed { background: var(--accent); color: #fff; }

  /* キーフレーズページ */
  table { width: 100%; border-collapse: collapse; margin: 10px 0 26px; font-size: 0.9rem; }
  th {
    text-align: left;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.09em;
    color: var(--muted);
    border-bottom: 1px solid var(--ink);
    padding: 4px 8px 6px;
  }
  td { padding: 8px; border-bottom: 1px solid var(--line); vertical-align: top; }
  td.en-cell { font-family: Georgia, "Times New Roman", serif; }
  td .play-btn { margin-left: 4px; }
  h3.section-title {
    font-size: 1rem;
    font-weight: 700;
    margin: 30px 0 2px;
  }
  .section-note { color: var(--muted); font-size: 0.83rem; }

  footer { text-align: center; color: var(--muted); font-size: 0.76rem; padding: 24px 20px 40px; }
  @media (max-width: 600px) {
    .bubble { max-width: 90%; }
    header h1 { font-size: 1.25rem; }
    .play-btn { font-size: 1rem; padding: 2px 8px; }
    .scene-actions button { padding: 9px 16px; font-size: 0.85rem; }
    .controls button { padding: 8px 14px; }
    nav button { padding: 6px 0; }
    #job-nav button { padding: 6px 1px 10px; }
    main { padding: 8px 16px calc(60px + env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body class="hide-ja-no">

<header>
  <h1>ワーホリ英会話トレーナー</h1>
  <p>職場を選んで、場面ごとに英語を練習する。色付きのラベルがあなたのセリフ。</p>
</header>

<div class="controls">
  <button id="mode-study" class="active" onclick="setMode('study')">学習</button>
  <button id="mode-roleplay" onclick="setMode('roleplay')">ロールプレイ</button>
  <select id="voice-select" onchange="changeVoice(this.value)" title="英語の音声を選ぶ"></select>
  <button id="toggle-ja" class="active" onclick="toggleJa()">和訳を隠す</button>
</div>

<nav id="job-nav"></nav>
<nav id="nav"></nav>
<main id="main"></main>

<footer>音声は端末の読み上げ機能(Web Speech API)を使用。上のメニューで声を変更できます。<br>iPhoneの場合:設定 → アクセシビリティ → 読み上げコンテンツ → 声 → 英語 で「Karen(拡張)」等をダウンロードすると、より自然な声が選べるようになります。<br>進捗はこのブラウザに自動保存されます。</footer>

let progress = JSON.parse(localStorage.getItem("steakProgress") || "{}");
let voices = [];

let savedVoiceName = localStorage.getItem("voiceName") || "";

function loadVoices() {
  voices = speechSynthesis.getVoices();
  renderVoiceSelect();
}
if ("speechSynthesis" in window) {
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

// 高音質(Enhanced/Premium/Siri)の音声を優先してスコア付け
function voiceScore(v) {
  let s = 0;
  const n = v.name.toLowerCase();
  if (n.includes("siri")) s += 6;
  if (n.includes("premium") || n.includes("プレミアム")) s += 5;
  if (n.includes("enhanced") || n.includes("natural") || n.includes("拡張")) s += 4;
  if (v.lang.startsWith("en-AU")) s += 2;
  else if (v.lang.startsWith("en-GB") || v.lang.startsWith("en-US")) s += 1;
  return s;
}

function englishVoices() {
  return voices
    .filter(v => v.lang.toLowerCase().startsWith("en"))
    .sort((a, b) => voiceScore(b) - voiceScore(a));
}

function pickVoice() {
  const list = englishVoices();
  if (savedVoiceName) {
    const v = list.find(v => v.name === savedVoiceName);
    if (v) return v;
  }
  return list[0] || null;
}

function renderVoiceSelect() {
  const sel = document.getElementById("voice-select");
  if (!sel) return;
  const list = englishVoices();
  if (!list.length) { sel.innerHTML = "<option>英語音声なし</option>"; return; }
  const current = pickVoice();
  sel.innerHTML = list.map(v =>
    `<option value="${esc(v.name)}"${current && v.name === current.name ? " selected" : ""}>🔊 ${esc(v.name)} (${v.lang})</option>`
  ).join("");
}

function changeVoice(name) {
  savedVoiceName = name;
  localStorage.setItem("voiceName", name);
  speak("G'day! How are you going today?", false);
}

function speak(text, isCustomer, onend) {
  if (!("speechSynthesis" in window)) { alert("このブラウザは音声読み上げに対応していません。"); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const v = pickVoice();
  if (v) u.voice = v;
  u.lang = v ? v.lang : "en-AU";
  u.rate = 0.92;
  u.pitch = isCustomer ? 1.1 : 1.0;
  if (onend) u.onend = onend;
  speechSynthesis.speak(u);
}

function playAll(sceneIdx) {
  if (!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const lines = SCENES[sceneIdx].lines;
  let i = 0;
  function next() {
    if (i >= lines.length) return;
    const line = lines[i];
    const u = new SpeechSynthesisUtterance(line.en);
    const v = pickVoice();
    if (v) u.voice = v;
    u.rate = 0.92;
    u.pitch = line.sp === "C" ? 1.1 : 1.0;
    u.onend = () => { i++; setTimeout(next, 500); };
    // ハイライト
    document.querySelectorAll(".line").forEach((el, idx) => {
      el.style.opacity = idx === i ? "1" : "0.45";
    });
    speechSynthesis.speak(u);
  }
  next();
}

function stopAll() {
  speechSynthesis.cancel();
  document.querySelectorAll(".line").forEach(el => el.style.opacity = "1");
}

function setMode(m) {
  mode = m;
  document.body.classList.toggle("roleplay", m === "roleplay");
  document.getElementById("mode-study").classList.toggle("active", m === "study");
  document.getElementById("mode-roleplay").classList.toggle("active", m === "roleplay");
  renderScene();
}

function toggleJa() {
  showJa = !showJa;
  document.body.classList.toggle("hide-ja", !showJa);
  const btn = document.getElementById("toggle-ja");
  btn.textContent = showJa ? "和訳を隠す" : "和訳を表示";
  btn.classList.toggle("active", showJa);
}

function toggleComplete(id) {
  progress[id] = !progress[id];
  localStorage.setItem("steakProgress", JSON.stringify(progress));
  renderJobNav();
  renderNav();
  renderScene();
}

function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;"); }

function renderNav() {
  const nav = document.getElementById("nav");
  let html = "";
  SCENES.forEach((s, i) => {
    const cls = [i === currentScene && currentScene < SCENES.length ? "active" : "", progress[s.id] ? "done" : ""].join(" ");
    html += `<button class="${cls}" onclick="goScene(${i})">${esc(s.title)}</button>`;
  });
  html += `<button class="${currentScene === -1 ? "active" : ""}" onclick="goPhrases()">キーフレーズ集</button>`;
  html += `<button class="${currentScene === -2 ? "active" : ""}" onclick="goAussie()">オージー単語帳</button>`;
  html += `<button class="${currentScene === -3 ? "active" : ""}" onclick="goInstant()">⚡瞬間英作文</button>`;
  nav.innerHTML = html;
}

function renderJobNav() {
  const nav = document.getElementById("job-nav");
  nav.innerHTML = JOBS.map((j, i) => {
    const doneCount = j.scenes.filter(s => progress[s.id]).length;
    const badge = doneCount > 0 ? ` (${doneCount}/${j.scenes.length})` : "";
    return `<button class="${i === currentJob ? "active" : ""}" onclick="goJob(${i})">${j.name}${badge}</button>`;
  }).join("");
}

function goJob(i) {
  stopAll();
  currentJob = i;
  SCENES = JOBS[i].scenes;
  currentScene = 0;
  renderJobNav();
  renderNav();
  renderScene();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function goScene(i) {
  stopAll();
  currentScene = i;
  renderNav();
  renderScene();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function goPhrases() {
  stopAll();
  currentScene = -1;
  renderNav();
  renderPhrases();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function goAussie() {
  stopAll();
  currentScene = -2;
  renderNav();
  renderAussie();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function renderScene() {
  aiChat = null; // AI会話中に他画面へ移動したら会話状態を破棄
  if (currentScene === -1) { renderPhrases(); return; }
  if (currentScene === -2) { renderAussie(); return; }
  if (currentScene === -3) { renderInstant(); return; }
  const s = SCENES[currentScene];
  let html = `
    <div class="scene-header">
      <h2>${esc(s.title)}</h2>
      <p>${esc(s.desc)}</p>
    </div>
    <div class="shadow-audio">
      <span class="section-note">🎧 ネイティブ音声:</span>
      <audio id="shadow-audio" controls preload="none" src="audio/${s.id}.mp3" onerror="this.parentElement.style.display='none'"></audio>
      <label class="section-note" style="white-space:nowrap"><input type="checkbox" onchange="document.getElementById('shadow-audio').loop=this.checked"> ループ</label>
    </div>
    <div class="scene-actions">
      <button onclick="playAll(${currentScene})">端末音声で再生</button>
      <button onclick="stopAll()">停止</button>
      <button onclick="startAIChat(${currentScene})">AIと実戦練習</button>
    </div>
  `;
  const job = JOBS[currentJob];
  const youLabel = job.youLabel || "YOU";
  const otherLabel = s.otherLabel || job.otherLabel || "CUSTOMER";
  s.lines.forEach((line) => {
    const isStaff = line.sp === "S";
    const hiddenCls = (mode === "roleplay" && isStaff) ? "hidden-answer" : "";
    html += `
      <div class="line ${isStaff ? "staff" : "customer"}">
        <div class="who">${isStaff ? youLabel : otherLabel}</div>
        <div class="bubble ${hiddenCls}" ${hiddenCls ? 'onclick="this.classList.remove(\'hidden-answer\')"' : ""}>
          <span class="en">${esc(line.en)}</span><button class="play-btn" onclick="event.stopPropagation(); speak(${JSON.stringify(line.en).replace(/"/g, "&quot;")}, ${line.sp === "C"})" title="音声を再生">▶</button>
          <div class="ja">${esc(line.ja)}</div>
        </div>
      </div>`;
  });
  html += `
    <div class="tips">
      <h3>このシーンのポイント</h3>
      <ul>${s.tips.map(t => `<li>${esc(t)}</li>`).join("")}</ul>
    </div>
    <div class="complete-row">
      <button class="${progress[s.id] ? "completed" : ""}" onclick="toggleComplete('${s.id}')">
        ${progress[s.id] ? "✓ マスター済み!" : "このシーンをマスターした"}
      </button>
    </div>
  `;
  if (currentScene < SCENES.length - 1) {
    html += `<div class="complete-row" style="margin-top:12px;"><button onclick="goScene(${currentScene + 1})">次のシーンへ →</button></div>`;
  }
  document.getElementById("main").innerHTML = html;
}

    <div class="scene-header">

/* ===== AIロールプレイ(オージー英語のAI会話練習) ===== */
const CHAT_MODEL = "claude-haiku-4-5";      // 会話ターン: 軽量・低コスト
const FEEDBACK_MODEL = "claude-opus-4-8";   // 総評: 高精度モデルで丁寧に
const JOB_SETTINGS = {
  steak: "a casual steakhouse restaurant",
  cafe: "a busy specialty cafe",
  gym: "a 24/7 gym (the learner works at the front desk and on the gym floor)",
  swim: "a swim school (the learner is a swimming instructor assistant; the other party may be a parent or a young child)",
  airport: "an airport (the learner is ground staff at check-in and the boarding gate)",
  flightexp: "a Boeing 737 flight simulator experience attraction in Surfers Paradise (the learner is front-desk staff and instructor)",
  interview: "a job interview / trial shift at a hospitality venue (you are the hiring manager or a senior colleague)",
  hotel: "a hotel on the Gold Coast (the learner is a housekeeper / room attendant)",
  thai: "a Thai restaurant (the learner waits tables, takes phone orders, and helps as a kitchen hand)",
  kebab: "a kebab shop in Surfers Paradise (the learner takes orders and makes kebabs, including late-night shifts)",
  demipair: "an Australian host family's home on the Gold Coast (the learner is a demi pair — childcare and light housework in exchange for homestay, while studying at a language school)"
};

const AI_ROLES = {
  MANAGER: "hiring manager or senior colleague",
  SUPERVISOR: "housekeeping supervisor who gives instructions and receives reports",
  GUEST: "hotel guest",
  CHEF: "head chef or kitchen coworker giving instructions",
  COWORKER: "coworker on the same shift",
  PARENT: "host parent of the family (warm, appreciative, occasionally asking about the kids or setting house rules)",
  KID: "young child of the host family, about 4-7 years old — speak in very short, simple, playful sentences, sometimes whiny or easily distracted, like a real kid"
};

let apiKey = localStorage.getItem("anthropicApiKey") || "";
let aiChat = null;

function startAIChat(sceneIdx) {
  stopAll();
  const job = JOBS[currentJob];
  aiChat = {
    scene: SCENES[sceneIdx],
    sceneIdx: sceneIdx,
    jobId: job.id,
    youLabel: job.youLabel || "YOU",
    otherLabel: SCENES[sceneIdx].otherLabel || job.otherLabel || "CUSTOMER",
    messages: [],
    waiting: false,
    error: null,
    feedback: null,
    handsFree: false
  };
  renderAIChat();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function exitAIChat() {
  aiChat = null;
  renderScene();
}

function aiSystemPrompt(chat) {
  const ref = chat.scene.lines.slice(0, 6)
    .map(l => `${l.sp === "S" ? "STAFF" : chat.otherLabel}: ${l.en}`).join("\n");
  return `You are an English conversation partner helping a Japanese working-holiday maker practise workplace English through role-play.

Setting: ${JOB_SETTINGS[chat.jobId] || "a workplace"} on the Gold Coast, Australia.
Scene: ${chat.scene.title} — ${chat.scene.desc}
Your role: you play the ${AI_ROLES[chat.otherLabel] || "customer (or whoever the staff member serves in this scene)"}. The learner plays the staff member and speaks first.

Guidelines:
- Speak natural, friendly Australian English (no worries, heaps, arvo, ta, mate...). Keep each reply to 1-2 short, spoken-style sentences.
- Stay in character and within this scene. React naturally and move the situation forward; occasionally add a realistic twist such as a special request, a follow-up question, or a mild complaint.
- Match the learner's level: if they struggle, use simpler English and slow the scene down. If they write in Japanese or ask for help, help briefly via the tip (in Japanese) but keep your reply in English and in character.
- tip: if the learner's last message has a clear error or a much more natural phrasing, give ONE short tip in Japanese (about 60 characters max), e.g. 「★5 wait → Could you wait... の方が丁寧」. If their English was fine, use null.

Reference dialogue for tone (do not copy it verbatim):
${ref}`;
}

async function callClaude(body) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify(body)
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    const err = new Error((data.error && data.error.message) || ("HTTP " + res.status));
    err.status = res.status;
    throw err;
  }
  return data;
}

function aiErrorMessage(e) {
  if (e.status === 401) return "APIキーが無効です。「キーを変更」から設定し直してください。";
  if (e.status === 429) return "リクエストが多すぎます。少し待ってからもう一度どうぞ。";
  if (e.status >= 500) return "Anthropic側が混み合っています。少し待ってからもう一度どうぞ。";
  return "エラーが発生しました: " + e.message;
}

async function sendChat() {
  if (!aiChat || aiChat.waiting) return;
  const input = document.getElementById("chat-input");
  const text = input ? input.value.trim() : "";
  if (!text) return;
  aiChat.messages.push({ role: "user", content: text });
  aiChat.waiting = true;
  aiChat.error = null;
  renderAIChat();
  try {
    const data = await callClaude({
      model: CHAT_MODEL,
      max_tokens: 1024,
      system: aiSystemPrompt(aiChat),
      output_config: {
        format: {
          type: "json_schema",
          schema: {
            type: "object",
            properties: {
              reply: { type: "string", description: "Your next line in English, staying in character. 1-2 short spoken sentences." },
              tip: { anyOf: [{ type: "string" }, { type: "null" }], description: "One short Japanese tip about the learner's last message, or null if it was fine." }
            },
            required: ["reply", "tip"],
            additionalProperties: false
          }
        }
      },
      messages: aiChat.messages.map(m =>
        m.role === "user" ? { role: "user", content: m.content } : { role: "assistant", content: m.reply }
      )
    });
    if (!aiChat) return; // 画面遷移済みなら破棄
    const block = (data.content || []).find(b => b.type === "text");
    let reply = "", tip = null;
    if (block) {
      try { const p = JSON.parse(block.text); reply = p.reply || ""; tip = p.tip || null; }
      catch (e) { reply = block.text; }
    }
    if (!reply) throw new Error("応答が空でした。もう一度送信してください。");
    aiChat.messages.push({ role: "assistant", reply: reply, tip: tip });
    aiChat.waiting = false;
    renderAIChat();
    // 連続会話モード: AIの読み上げが終わったら自動でマイクを再開
    speak(reply, true, () => {
      if (aiChat && aiChat.handsFree && !aiChat.waiting && !micListening) toggleMic();
    });
  } catch (e) {
    if (!aiChat) return;
    aiChat.waiting = false;
    aiChat.error = aiErrorMessage(e);
    const undone = aiChat.messages.pop(); // 送信失敗分を入力欄に戻す
    renderAIChat();
    const inp = document.getElementById("chat-input");
    if (inp && undone && undone.role === "user") inp.value = undone.content;
  }
}

async function endChat() {
  if (!aiChat || aiChat.waiting) return;
  if (aiChat.messages.length < 2) { aiChat.error = "まずは何往復か会話してから総評をもらいましょう。"; renderAIChat(); return; }
  aiChat.waiting = true;
  aiChat.error = null;
  renderAIChat();
  const transcript = aiChat.messages.map(m =>
    m.role === "user" ? `STAFF(学習者): ${m.content}` : `${aiChat.otherLabel}: ${m.reply}`
  ).join("\n");
  try {
    const data = await callClaude({
      model: FEEDBACK_MODEL,
      max_tokens: 1500,
      system: "You are a supportive English coach for a Japanese working-holiday maker preparing to work on the Gold Coast. You give feedback in Japanese.",
      messages: [{
        role: "user",
        content: `以下はロールプレイ練習の会話記録です(場面: ${aiChat.scene.title})。学習者(STAFF)の英語について日本語で総評してください。構成: ①良かった点(2〜3個) ②改善点(2〜3個、より自然な言い方の例文付き) ③この場面で丸暗記すべきフレーズ3つ。励ます調子で、簡潔に。\n\n${transcript}`
      }]
    });
    if (!aiChat) return;
    aiChat.feedback = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
    aiChat.waiting = false;
    renderAIChat();
  } catch (e) {
    if (!aiChat) return;
    aiChat.waiting = false;
    aiChat.error = aiErrorMessage(e);
    renderAIChat();
  }
}

function saveApiKey() {
  const input = document.getElementById("api-key-input");
  const key = input ? input.value.trim() : "";
  if (!key || key.indexOf("sk-ant") !== 0) {
    const el = document.getElementById("key-error");
    if (el) el.textContent = "キーの形式が正しくないようです(sk-ant-で始まります)。";
    return;
  }
  apiKey = key;
  localStorage.setItem("anthropicApiKey", key);
  renderAIChat();
}

function changeApiKey() {
  apiKey = "";
  localStorage.removeItem("anthropicApiKey");
  renderAIChat();
}

function toggleHandsFree() {
  if (!aiChat) return;
  aiChat.handsFree = !aiChat.handsFree;
  renderAIChat();
  if (aiChat.handsFree && !micListening && !aiChat.waiting) toggleMic();
}

function renderAIChat() {
  if (!aiChat) return;
  if (!apiKey) { renderKeySetup(); return; }
  const hasSR = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
  const firstStaffLine = aiChat.scene.lines.find(l => l.sp === "S");
  let html = `
    <div class="scene-header">
      <h2>AIロールプレイ — ${esc(aiChat.scene.title)}</h2>
      <p>${esc(aiChat.scene.desc)}<br>あなたがスタッフ役。相手役はAIが演じます。英語で話しかけてみよう。</p>
    </div>
    <div class="scene-actions">
      <button onclick="exitAIChat()">← シーンに戻る</button>
      <button onclick="endChat()">終了して総評をもらう</button>
      ${hasSR ? `<button onclick="toggleHandsFree()" style="${aiChat.handsFree ? "background:var(--accent);color:#fff;border-color:var(--accent);" : ""}">🎙️ 連続会話 ${aiChat.handsFree ? "ON" : "OFF"}</button>` : ""}
      <button onclick="changeApiKey()">キーを変更</button>
    </div>`;
  if (!aiChat.messages.length && firstStaffLine) {
    html += `<p class="ai-hint">まずはあなたから。例: "${esc(firstStaffLine.en)}"${hasSR ? "<br>🎤で話すと自動送信。「🎙️ 連続会話」をONにすると、ボタンに触らず声だけで会話が続きます。" : ""}</p>`;
  }
  aiChat.messages.forEach(m => {
    if (m.role === "user") {
      html += `<div class="line staff"><div class="who">${esc(aiChat.youLabel)}(あなた)</div><div class="bubble"><span class="en">${esc(m.content)}</span></div></div>`;
    } else {
      html += `<div class="line customer"><div class="who">${esc(aiChat.otherLabel)}(AI)</div><div class="bubble"><span class="en">${esc(m.reply)}</span><button class="play-btn" onclick="speak(${JSON.stringify(m.reply).replace(/"/g, "&quot;")}, true)">▶</button>${m.tip ? `<div class="ja">💡 ${esc(m.tip)}</div>` : ""}</div></div>`;
    }
  });
  if (aiChat.waiting) {
    html += `<div class="line customer"><div class="who">${esc(aiChat.otherLabel)}(AI)</div><div class="bubble"><span class="en">…</span></div></div>`;
  }
  if (aiChat.error) html += `<p class="ai-error">${esc(aiChat.error)}</p>`;
  if (aiChat.feedback) {
    html += `<div class="tips"><h3>コーチの総評</h3><div style="white-space:pre-wrap">${esc(aiChat.feedback)}</div></div>
      <div class="complete-row"><button onclick="startAIChat(${aiChat.sceneIdx})">もう一度挑戦する</button></div>`;
  }
  html += `
    <div class="chat-input-row">
      ${hasSR ? '<button id="mic-btn" onclick="toggleMic()" title="マイクで英語入力(話し終わると自動送信)">🎤</button>' : ""}
      <input id="chat-input" type="text" placeholder="英語で入力(日本語で助けを求めてもOK)" autocomplete="off"
        onkeydown="if(event.key==='Enter'){event.preventDefault();sendChat();}" ${aiChat.waiting ? "disabled" : ""}>
      <button onclick="sendChat()" ${aiChat.waiting ? "disabled" : ""}>送信</button>
    </div>`;
  document.getElementById("main").innerHTML = html;
  const inp = document.getElementById("chat-input");
  if (inp && !aiChat.waiting) inp.focus();
  window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
}

let micRec = null, micListening = false;
function toggleMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  if (micListening && micRec) { micRec.stop(); return; }
  micRec = new SR();
  micRec.lang = "en-AU";
  micRec.interimResults = false;
  micListening = true;
  const btn = document.getElementById("mic-btn");
  if (btn) btn.classList.add("listening");
  micRec.onresult = e => {
    const t = e.results[0][0].transcript;
    const input = document.getElementById("chat-input");
    if (input) {
      input.value = (input.value ? input.value + " " : "") + t;
      sendChat(); // 話し終わったら自動送信
    }
  };
  micRec.onend = () => {
    micListening = false;
    const b = document.getElementById("mic-btn");
    if (b) b.classList.remove("listening");
  };
  micRec.onerror = micRec.onend;
  micRec.start();
}

/* ===== 瞬間英作文トレーナー(間隔反復) ===== */
const SRS_INTERVALS = [1, 3, 7, 14, 30]; // ○の回数に応じて次回出題までの日数が伸びる
let srs = JSON.parse(localStorage.getItem("srsData") || "{}");
if (!srs.cards) srs.cards = {};
if (!srs.day) srs.day = {};

function srsDateStr(offsetDays) {
  const d = new Date();
  d.setDate(d.getDate() + (offsetDays || 0));
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function srsSave() { localStorage.setItem("srsData", JSON.stringify(srs)); }

// カード素材 = 全職種のスタッフ側セリフ + キーフレーズ集
function srsPool() {
  const pool = [], seen = {};
  JOBS.forEach(j => j.scenes.forEach(s => s.lines.forEach(l => {
    if (l.sp === "S" && !seen[l.en]) { seen[l.en] = 1; pool.push({ en: l.en, ja: l.ja, job: j.id }); }
  })));
  PHRASES.forEach(g => g.items.forEach(it => {
    if (!seen[it.en]) { seen[it.en] = 1; pool.push({ en: it.en, ja: it.ja, job: "phrases" }); }
  }));
  return pool;
}

let sedQueue = [], sedCurrent = null, sedRevealed = false;

function goInstant() {
  stopAll();
  currentScene = -3;
  renderNav();
  startInstantSession(false);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function setJobFilter(v) {
  srs.jobFilter = v;
  srsSave();
  startInstantSession(false);
}

function startInstantSession(extraNew) {
  const today = srsDateStr(0);
  if (srs.day.date !== today) srs.day = { date: today, newUsed: 0, reviewsDone: 0, ok: 0, ng: 0, extra: 0 };
  if (extraNew) srs.day.extra = (srs.day.extra || 0) + 5;
  srsSave();
  const filter = srs.jobFilter || "";
  const due = [], fresh = [];
  srsPool().forEach(c => {
    const st = srs.cards[c.en];
    if (st) { if (st.d <= today) due.push({ c: c, d: st.d }); }
    else if (!filter || c.job === filter) fresh.push(c);
  });
  due.sort((a, b) => (a.d < b.d ? -1 : 1)); // 期限が古い順に復習
  const reviewSlots = Math.max(0, 15 - srs.day.reviewsDone);
  const newSlots = Math.max(0, 5 + (srs.day.extra || 0) - srs.day.newUsed);
  sedQueue = due.slice(0, reviewSlots).map(x => ({ card: x.c, isNew: false }))
    .concat(fresh.slice(0, newSlots).map(c => ({ card: c, isNew: true })));
  sedNext();
}

function sedNext() {
  sedCurrent = sedQueue.length ? sedQueue.shift() : null;
  sedRevealed = false;
  renderInstant();
}

function sedReveal() {
  if (!sedCurrent || sedRevealed) return;
  sedRevealed = true;
  renderInstant();
  speak(sedCurrent.card.en, false);
}

function sedGrade(ok) {
  if (!sedCurrent) return;
  const en = sedCurrent.card.en;
  const st = srs.cards[en] || { l: 0, d: "" };
  if (ok) {
    st.d = srsDateStr(SRS_INTERVALS[Math.min(st.l, SRS_INTERVALS.length - 1)]);
    st.l = Math.min(st.l + 1, SRS_INTERVALS.length);
    srs.day.ok++;
  } else {
    st.l = 0;
    st.d = srsDateStr(1); // 言えなかったら明日また
    srs.day.ng++;
  }
  srs.cards[en] = st;
  if (sedCurrent.isNew) srs.day.newUsed++; else srs.day.reviewsDone++;
  srsSave();
  sedNext();
}

function renderInstant() {
  aiChat = null;
  const today = srsDateStr(0);
  const remaining = sedQueue.length + (sedCurrent ? 1 : 0);
  const jobOptions = ['<option value="">全職種(シーン順)</option>']
    .concat(JOBS.map(j => `<option value="${j.id}"${srs.jobFilter === j.id ? " selected" : ""}>${esc(j.name)}</option>`))
    .join("");
  let html = `
    <div class="scene-header">
      <h2>瞬間英作文 — 接客フレーズ</h2>
      <p>日本語を見たら<strong>2秒以内に声に出して</strong>英語で言う → 答えを見て○✗を自己判定。<br>今日のメニュー: 復習15 + 新規5。✗は明日、○は1日→3日→7日→14日→30日後に再出題されます。</p>
    </div>
    <div class="scene-actions" style="align-items:center">
      <span class="section-note">新規カードの職種:</span>
      <select class="sed-select" onchange="setJobFilter(this.value)">${jobOptions}</select>
    </div>`;
  if (sedCurrent) {
    const c = sedCurrent.card;
    html += `
    <div class="sed-card">
      <div class="section-note">${sedCurrent.isNew ? "新規" : "復習"} ・ 残り${remaining}枚</div>
      <div class="sed-ja">${esc(c.ja)}</div>
      ${sedRevealed
        ? `<div class="sed-en">${esc(c.en)}<button class="play-btn" onclick="speak(${JSON.stringify(c.en).replace(/"/g, "&quot;")}, false)">▶</button></div>
           <div class="sed-btns">
             <button class="sed-ok" onclick="sedGrade(true)">○ 2秒で言えた</button>
             <button class="sed-ng" onclick="sedGrade(false)">✗ 言えなかった</button>
           </div>`
        : `<div class="sed-timer"><div></div></div>
           <div class="sed-btns"><button onclick="sedReveal()">答えを見る</button></div>`}
    </div>`;
  } else {
    const d = srs.day;
    const dueTomorrow = Object.keys(srs.cards).filter(k => srs.cards[k].d <= srsDateStr(1)).length;
    html += `
    <div class="sed-card">
      <div class="sed-ja">今日の分は完了!おつかれさま 🎉</div>
      <p class="section-note" style="margin-top:12px">今日の成績: ○ ${d.ok} / ✗ ${d.ng}${d.ng ? "(✗は明日また出ます)" : ""}<br>明日の予定: 復習${Math.min(dueTomorrow, 15)}枚 + 新規5枚</p>
      <div class="sed-btns">
        <button onclick="startInstantSession(true)">余力があるので追加で新規5枚</button>
      </div>
    </div>`;
  }
  document.getElementById("main").innerHTML = html;
}

renderJobNav();
renderNav();
renderScene();
</script>
